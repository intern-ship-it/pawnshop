name: Deploy to cPanel

on:
  push:
    branches:
      - dev
      - live

jobs:
  deploy:
    name: Deploy PawnSys
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 300s
          command_timeout: 600s
          script: |
            echo "🚀 Deploying branch: ${{ github.ref_name }}"

            # Choose deploy path based on branch
            if [ "${{ github.ref_name }}" = "live" ]; then
              DEPLOY_PATH=~/public_html/dsaraassetventures.com
            else
              DEPLOY_PATH=~/public_html/devtesting.dsaraassetventures.com
            fi

            cd $DEPLOY_PATH

            # Run deploy.sh (auto-detects branch via git rev-parse)
            chmod +x deploy.sh
            bash deploy.sh

            echo "✅ Deployment completed for ${{ github.ref_name }}!"